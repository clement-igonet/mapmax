  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#3c7a4e">HTML + JS ES modules</text>
  <defs><marker id="arr4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#888"/></marker></defs>
  <line x1="240" y1="90" x2="320" y2="90" stroke="#888" stroke-width="2" marker-end="url(#arr4)"/>
  <rect x="330" y="55" width="160" height="70" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
