  <text x="410" y="105" text-anchor="middle" font-size="11" fill="#666">MapLibre + three.js</text>
  <line x1="490" y1="90" x2="570" y2="90" stroke="#888" stroke-width="2" marker-end="url(#arr4)"/>
  <rect x="580" y="45" width="140" height="42" rx="8" fill="#fff3e0" stroke="#ff6f00" stroke-width="2"/>
