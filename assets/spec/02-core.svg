<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, sans-serif">
  <rect width="760" height="300" rx="10" fill="#f6f8fa"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Inside the photosphere — camera at human sight (~1.7 m)</text>
  <!-- photosphere -->
  <circle cx="380" cy="170" r="115" fill="#fff3e0" stroke="#ff6f00" stroke-width="3" stroke-dasharray="6 5"/>
  <!-- ground line -->
  <line x1="90" y1="225" x2="670" y2="225" stroke="#888" stroke-width="2"/>
  <!-- road -->
  <path d="M300 225 L340 285 M460 225 L420 285 M380 235 L380 250 M380 260 L380 275" stroke="#666" stroke-width="3"/>
  <!-- person -->
  <g stroke="#333" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="380" cy="160" r="9" fill="#333"/>
    <line x1="380" y1="169" x2="380" y2="200"/>
    <line x1="380" y1="200" x2="368" y2="223"/>
    <line x1="380" y1="200" x2="392" y2="223"/>
    <line x1="380" y1="180" x2="365" y2="195"/>
    <line x1="380" y1="180" x2="395" y2="195"/>
  </g>
  <text x="345" y="215" text-anchor="middle" font-size="11" fill="#666">1.7 m</text>
  <!-- view cone -->
  <path d="M380 165 L500 110 M380 165 L495 190" stroke="#2962ff" stroke-width="2" stroke-dasharray="4 4"/>
  <!-- buildings mixed in -->
  <g fill="#2962ff" opacity="0.35">
    <rect x="500" y="120" width="45" height="105"/>
    <rect x="555" y="145" width="35" height="80"/>
  </g>
  <text x="545" y="105" font-size="12" fill="#1a44b8">OSM 3D buildings mixed in</text>
  <!-- nav arrow on street -->
  <path d="M380 268 L370 252 L376 252 L376 240 L384 240 L384 252 L390 252 Z" fill="#ff6f00" transform="rotate(180 380 254)"/>
  <text x="415" y="272" font-size="12" fill="#b34c00">arrow to next picture</text>
  <!-- drag hint -->
  <path d="M255 120 A130 130 0 0 1 330 85" fill="none" stroke="#888" stroke-width="2" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#888"/></marker></defs>
  <text x="240" y="105" text-anchor="end" font-size="12" fill="#666">drag to look around</text>
</svg>
